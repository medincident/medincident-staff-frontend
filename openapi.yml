        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /departments/{departmentId}/responsibles:
    get:
      tags: [Departments]
      summary: Get department responsibles
      description: |
        Requires administrator privileges.
        Returns responsibles assigned directly to the department,
        as well as clinic and organization responsibles (inherited from parent units).
        Inherited responsibles from clinic and organization cannot be removed at the department level.
      operationId: listDepartmentResponsibles
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of responsibles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDepartmentResponsiblesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Departments]
      summary: Add department responsible
      description: |
        Requires administrator privileges.
        The user must belong to this specific department.
      operationId: addDepartmentResponsible
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDepartmentResponsibleRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /departments/{departmentId}/responsible-candidates:
    get:
      tags: [Departments]
      summary: Get department responsible candidates
      description: |
        Requires administrator privileges.
        Returns only suitable candidates by default.
        When includeIneligible=true, ineligible candidates are also returned with reasons.
        Deactivated users are not returned.
      operationId: listDepartmentResponsibleCandidates
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
        - $ref: "#/components/parameters/SearchText"
        - $ref: "#/components/parameters/IncludeIneligible"
        - $ref: "#/components/parameters/IneligibilityReasonCodes"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of department responsible candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDepartmentResponsibleCandidatesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /departments/{departmentId}/responsibles/{responsibleUserId}:
    delete:
      tags: [Departments]
      summary: Remove department responsible
      description: |
        Requires administrator privileges.
        Removes a responsible assigned directly to the department.
        Inherited responsibles from clinic and organization are removed at their respective levels.
      operationId: removeDepartmentResponsible
      parameters:
        - $ref: "#/components/parameters/DepartmentId"
        - $ref: "#/components/parameters/ResponsibleUserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /events/categories:
    get:
      tags: [Events]
      summary: List of event categories
      description: |
        Requires administrator privileges.
        Returns only active categories by default.
        Deactivated categories are considered disabled permanently and excluded from normal navigation.
        When includeDeactivated=true, deactivated categories are also returned.
        Categories are returned in a flat list in depth-first traversal order:
        first the root category, then all its children, then the next root one.
        For child categories, parentId is filled so the UI can reconstruct the tree.
      operationId: listEventCategories
      parameters:
        - $ref: "#/components/parameters/IncludeDeactivated"
        - $ref: "#/components/parameters/SearchText"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventCategoriesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Events]
      summary: Create new event category
      description: Requires administrator privileges.
      operationId: createEventCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "201":
          description: Resource created
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventCategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /events/categories/{categoryId}:
    get:
      tags: [Events]
      summary: Get event category by ID
      description: |
        Deactivated categories (including those deactivated recursively by parent) return 404.
      operationId: getEventCategoryById
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: Event category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventCategoryByIdResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Events]
      summary: Update event category
      description: |
        Requires administrator privileges.
        Supports changing parentId (moving in the tree).
        Creating cycles and specifying the category as its own parent is forbidden.
      operationId: updateEventCategory
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"
    delete:
      tags: [Events]
      summary: Delete event category
      description: |
        Requires administrator privileges.
        Deletes the category and its entire subtree (all child categories recursively).
        All event types within deleted categories are also deleted.
      operationId: deleteEventCategory
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /events/categories/{categoryId}/deactivate:
    post:
      tags: [Events]
      summary: Deactivate event category
      description: |
        Requires administrator privileges.
        Deactivates the category and its entire subtree (all child categories recursively).
        All event types within deactivated categories are deactivated as well.
        Historical events are preserved.
      operationId: deactivateEventCategory
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /events/categories/{categoryId}/reactivate:
    post:
      tags: [Events]
      summary: Reactivate event category
      description: |
        Requires administrator privileges.
        Reactivates the category and its subtree (all child categories recursively).
        Event types within reactivated categories are also reactivated.
      operationId: reactivateEventCategory
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

