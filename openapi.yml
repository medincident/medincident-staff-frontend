openapi: 3.0.3
info:
  title: Medincident Employee API
  version: "1.0.0"
  description: |
    API for the adverse event reporting system in a medical organization.

servers:
  - url: /api/v1
    description: Relative gateway base URL

tags:
  - name: Users
    description: Operations with users and their settings.
  - name: Organizations
    description: Management of organizations and related assignments.
  - name: Clinics
    description: Management of clinics within organizations.
  - name: Departments
    description: Management of departments and employees.
  - name: Events
    description: Management of the adverse event classifier (categories and types).

security:
  - BearerAuth: []

components:
  schemas:
    UserNameBrief:
      type: object
      required: [name, shortName]
      properties:
        name:
          type: string
          description: Display name (e.g. John Doe)
        shortName:
          type: string
          description: Short name (e.g. Doe J.)

    UserNameFields:
      type: object
      required: [givenName]
      properties:
        givenName:
          type: string
          minLength: 1
          maxLength: 100
          description: First name
        familyName:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: Last name
        middleName:
          type: string
          minLength: 1
          maxLength: 100
          nullable: true
          description: Middle name

    UserBrief:
      allOf:
        - type: object
          required: [id]
          properties:
            id:
              type: string
              description: Unique user identifier.
            picture:
              type: string
              format: uri
              nullable: true
              description: User image URL. Only returned if set.
            email:
              type: string
              format: email
              nullable: true
            isActive:
              type: boolean
              nullable: true
              description: User activity flag. Only returned to administrators.

        - $ref: "#/components/schemas/UserNameBrief"

    Employment:
      type: object
      required: [organization, clinic, department]
      properties:
        organization:
          $ref: "#/components/schemas/OrganizationBrief"
        clinic:
          $ref: "#/components/schemas/ClinicBrief"
        department:
          $ref: "#/components/schemas/DepartmentBrief"
        position:
          type: string
          maxLength: 255
          description: Position in the department

    User:
      allOf:
        - $ref: "#/components/schemas/UserBrief"
        - $ref: "#/components/schemas/UserNameFields"
        - type: object
          properties:
            employment:
              allOf:
                - $ref: "#/components/schemas/Employment"
              nullable: true
            isAdmin:
              type: boolean
              nullable: true
              description: Administrator flag. Only returned to users with administrator privileges.

    GeoPoint:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          description: Latitude in decimal degrees.
        lng:
          type: number
          description: Longitude in decimal degrees.

    Address:
      type: object
      required: [value]
      properties:
        value:
          type: string
          maxLength: 500
        point:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true

    OrganizationBrief:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 255
        isActive:
          type: boolean
          nullable: true

    Organization:
      type: object
      required: [id, name, legalAddress]
      allOf:
        - $ref: "#/components/schemas/OrganizationBrief"
        - type: object
          required: [legalAddress]
          properties:
            description:
              type: string
              maxLength: 2000
              nullable: true
            legalAddress:
              $ref: "#/components/schemas/Address"

    ClinicBrief:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 255
        isActive:
          type: boolean
          nullable: true

    Clinic:
      type: object
      required: [organizationId, physicalAddress]
      allOf:
        - $ref: "#/components/schemas/ClinicBrief"
        - type: object
          properties:
            organizationId:
              type: string
            description:
              type: string
              maxLength: 2000
              nullable: true
            physicalAddress:
              $ref: "#/components/schemas/Address"

    DepartmentBrief:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 255
        isActive:
          type: boolean
          nullable: true

    Department:
      type: object
      allOf:
        - $ref: "#/components/schemas/DepartmentBrief"
        - type: object
          properties:
            clinicId:
              type: string
            description:
              type: string
              nullable: true
              maxLength: 2000

    Error:
      type: object
      required:
        - message
        - traceId
      properties:
        message:
          type: string
        details:
          $ref: "#/components/schemas/ErrorDetails"
          x-nullable: true
          nullable: true
        traceId:
          type: string

    ErrorDetails:
      oneOf:
        - $ref: "#/components/schemas/ValidationErrorDetails"
        - $ref: "#/components/schemas/UnauthorizedErrorDetails"
        - $ref: "#/components/schemas/ForbiddenErrorDetails"
        - $ref: "#/components/schemas/NotFoundErrorDetails"
        - $ref: "#/components/schemas/ConflictErrorDetails"
        - $ref: "#/components/schemas/BusinessRuleViolationDetails"
      discriminator:
        propertyName: type
        mapping:
          validation: "#/components/schemas/ValidationErrorDetails"
          unauthorized: "#/components/schemas/UnauthorizedErrorDetails"
          forbidden: "#/components/schemas/ForbiddenErrorDetails"
          not_found: "#/components/schemas/NotFoundErrorDetails"
          conflict: "#/components/schemas/ConflictErrorDetails"
          business_rule_violation: "#/components/schemas/BusinessRuleViolationDetails"

    ValidationErrorFieldDetail:
      type: object
      required: [field, issue]
      properties:
        field:
          type: string
        issue:
          type: string

    ValidationErrorDetails:
      type: object
      required: [type, fields]
      properties:
        type:
          type: string
          enum: [validation]
        fields:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ValidationErrorFieldDetail"

    UnauthorizedErrorDetails:
      type: object
      required: [type, reason]
      properties:
        type:
          type: string
          enum: [unauthorized]
        reason:
          type: string

    ForbiddenErrorDetails:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [forbidden]
        requiredPermission:
          type: string

    NotFoundErrorDetails:
      type: object
      required: [type, resource]
      properties:
        type:
          type: string
          enum: [not_found]
        resource:
          type: string
        id:
          type: string

    ConflictErrorDetails:
      type: object
      required: [type, feature]
      properties:
        type:
          type: string
          enum: [conflict]
        feature:
          type: string
          description: Feature or resource attribute that caused the conflict (e.g. 'code', 'email').

    BusinessRuleViolationDetails:
      type: object
      required: [type, reason]
      properties:
        type:
          type: string
          enum: [business_rule_violation]
        reason:
          type: string
          description: Machine-readable error code explaining the violation.

    CursorPagination:
      type: object
      required: [limit, hasMore]
      properties:
        cursor:
          type: string
          nullable: true
          description: Current position token (echo of the request).
        nextCursor:
          type: string
          nullable: true
          description: Token for requesting the next page.
        limit:
          type: integer
          minimum: 1
          maximum: 100
        hasMore:
          type: boolean

    NotificationChannel:
      type: string
      enum: [telegram, push, email]

    NotificationEventType:
      type: string
      enum: [event_created, event_status_changed, chat_message, report_ready]

    DayOfWeek:
      type: string
      description: Day of the week (ISO 8601).
      enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]

    NotificationRule:
      type: object
      required: [channel, enabled, eventTypes]
      properties:
        channel:
          $ref: "#/components/schemas/NotificationChannel"
        enabled:
          type: boolean
        eventTypes:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/NotificationEventType"

    NotificationQuietHours:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        start:
          type: string
          format: time
          nullable: true
          description: Required when enabled=true.
        end:
          type: string
          format: time
          nullable: true
          description: Required when enabled=true.
        timezone:
          type: string
          example: Europe/Moscow

    NotificationSchedule:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: |
            If true — notifications are sent only on days listed in activeDays.
            If false — schedule is not applied, notifications are sent every day.
        activeDays:
          type: array
          nullable: true
          uniqueItems: true
          minItems: 1
          description: |
            Days of the week when notifications are allowed.
            Required when enabled=true. Ignored when enabled=false.
          items:
            $ref: "#/components/schemas/DayOfWeek"

    NotificationSettings:
      type: object
      required: [rules, quietHours, schedule]
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/NotificationRule"
        quietHours:
          $ref: "#/components/schemas/NotificationQuietHours"
        schedule:
          $ref: "#/components/schemas/NotificationSchedule"

    UpdateUserDisplayNameRequest:
      allOf:
        - $ref: "#/components/schemas/UserNameFields"

    OrganizationListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationBrief"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    ClinicListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClinicBrief"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    DepartmentListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentBrief"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    CreateOrganizationRequest:
      type: object
      required: [name, legalAddress]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        legalAddress:
          $ref: "#/components/schemas/Address"

    UpdateOrganizationRequest:
      type: object
      required: [name, legalAddress]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        legalAddress:
          $ref: "#/components/schemas/Address"

    CreateClinicRequest:
      type: object
      required: [name, physicalAddress]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        physicalAddress:
          $ref: "#/components/schemas/Address"

    UpdateClinicRequest:
      type: object
      required: [name, physicalAddress]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        physicalAddress:
          $ref: "#/components/schemas/Address"

    CreateDepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true

    UpdateDepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true

    EnableOrganizationCategoryRequest:
      type: object
      required: [categoryId]
      properties:
        categoryId:
          type: string

    AddResponsibleRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string

    AssignDepartmentEmployeeRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        position:
          type: string
          maxLength: 255

    DepartmentEmployee:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserBrief"
        position:
          type: string
        assignedAt:
          type: string
          format: date-time

    OrganizationEmployee:
      type: object
      required: [user, clinic, department]
      properties:
        user:
          $ref: "#/components/schemas/UserBrief"
        clinic:
          $ref: "#/components/schemas/ClinicBrief"
        department:
          $ref: "#/components/schemas/DepartmentBrief"
        position:
          type: string
        assignedAt:
          type: string
          format: date-time

    ClinicEmployee:
      type: object
      required: [user, department]
      properties:
        user:
          $ref: "#/components/schemas/UserBrief"
        department:
          $ref: "#/components/schemas/DepartmentBrief"
        position:
          type: string
        assignedAt:
          type: string
          format: date-time

    DepartmentEmployeeListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentEmployee"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    OrganizationEmployeeListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationEmployee"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    ClinicEmployeeListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClinicEmployee"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    CategoryBrief:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
        parentId:
          type: string
          nullable: true
          description: Parent category identifier. null for root categories.
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        isActive:
          type: boolean
          nullable: true

    OrganizationCategoryAllocation:
      type: object
      required: [category, isDirectlyEnabled]
      properties:
        category:
          $ref: "#/components/schemas/CategoryBrief"
        isDirectlyEnabled:
          type: boolean
          description: |
            true — category is explicitly enabled for this organization.
            false — category is enabled via inheritance from a parent category.
        enabledFrom:
          allOf:
            - $ref: "#/components/schemas/CategoryBrief"
          nullable: true
          description: |
            Parent category from which this permission is inherited.
            Not null only when isDirectlyEnabled=false.

    OrganizationCategoryListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          description: |
            Flat list of categories allowed for the organization (explicitly and via inheritance),
            in depth-first traversal order.
            UI uses category.parentId to reconstruct the tree.
          items:
            $ref: "#/components/schemas/OrganizationCategoryAllocation"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    OrganizationCategoryCandidate:
      type: object
      required: [category, eligible, ineligibilityReasons, childrenCount]
      properties:
        category:
          $ref: "#/components/schemas/CategoryBrief"
        eligible:
          type: boolean
          description: |
            true — category can be enabled for the organization.
            false — category cannot be enabled (e.g., already enabled directly or via inheritance).
        ineligibilityReasons:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCandidateIneligibilityReason"
        childrenCount:
          type: integer
          minimum: 0
          description: Number of direct child categories.

    OrganizationCategoryCandidateListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          description: |
            Flat list of category candidates in depth-first traversal order.
            UI uses category.parentId to reconstruct the tree.
          items:
            $ref: "#/components/schemas/OrganizationCategoryCandidate"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    CategoryCandidateIneligibilityReasonCode:
      type: string
      enum: [already_enabled_directly, already_enabled_via_parent]

    CategoryCandidateIneligibilityReason:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/CategoryCandidateIneligibilityReasonCode"
        message:
          type: string
        source:
          allOf:
            - $ref: "#/components/schemas/CategoryBrief"
          nullable: true
          description: |
            Source category of the ineligibility reason.
            For example, a parent category through which the current permission is already inherited.

    CategoryResponsibleListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          description: |
            List of responsibles for the category within the organization context.
            Includes responsibles assigned directly to the category,
            as well as responsibles inherited from the parent category.
          items:
            $ref: "#/components/schemas/ResponsibleWithSource"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    Category:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
        parentId:
          type: string
          nullable: true
          description: Parent category identifier. null for root categories.
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        isActive:
          type: boolean
          nullable: true

    EventType:
      type: object
      required: [id, categoryId, code, name, patientCanReport]
      properties:
        id:
          type: string
        categoryId:
          type: string
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        patientCanReport:
          type: boolean
          description: Whether a patient can create a complaint/report with this event type.
        isActive:
          type: boolean
          nullable: true

    CreateCategoryRequest:
      type: object
      required: [code, name]
      properties:
        parentId:
          type: string
          nullable: true
          description: Parent category identifier. If null, a root category is created.
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true

    UpdateCategoryRequest:
      type: object
      properties:
        parentId:
          type: string
          nullable: true
          description: New parent of the category. null makes the category a root one.
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        isActive:
          type: boolean

    CreateEventTypeRequest:
      type: object
      required: [code, name, patientCanReport]
      properties:
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        patientCanReport:
          type: boolean
          description: Whether a patient can create a complaint/report with this event type.

    UpdateEventTypeRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        patientCanReport:
          type: boolean
        isActive:
          type: boolean

    CategoryListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          description: |
            Flat list of categories in depth-first traversal order.
            UI uses parentId of each category to reconstruct the tree.
          items:
            $ref: "#/components/schemas/CategoryBrief"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    EventTypeListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EventType"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    UserListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserBrief"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    InheritedFromSource:
      type: object
      required: [type, id, name]
      properties:
        type:
          type: string
          enum: [organization, clinic, department, category]
          description: Type of organizational unit or category from which responsibility is inherited
        id:
          type: string
        name:
          type: string
          description: Name of the organizational unit or category

    ResponsibleWithSource:
      type: object
      required: [user, isDirectlyAssigned]
      properties:
        user:
          $ref: "#/components/schemas/UserBrief"
        isDirectlyAssigned:
          type: boolean
          description: |
            true — responsible is assigned directly to this level and can be removed.
            false — responsible is inherited from a parent organizational unit and cannot be removed at this level.
        inheritedFrom:
          allOf:
            - $ref: "#/components/schemas/InheritedFromSource"
          nullable: true
          description: |
            Information about the organizational unit from which responsibility is inherited.
            Not null only when isDirectlyAssigned=false.
            Inherited responsibles cannot be edited or removed at this level.

    ResponsibleListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          description: |
            List of responsibles, including those inherited from parent organizational units.
            Responsibles with isDirectlyAssigned=true are assigned directly and are available for editing/removal.
            Responsibles with isDirectlyAssigned=false are inherited from a parent unit (specified in inheritedFrom) and are not available for editing/removal at this level.
          items:
            $ref: "#/components/schemas/ResponsibleWithSource"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    IneligibilityReasonCode:
      type: string
      enum:
        - not_an_employee
        - different_organization
        - different_clinic
        - different_department

    IneligibilityReason:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/IneligibilityReasonCode"
        message:
          type: string
        source:
          allOf:
            - $ref: "#/components/schemas/InheritedFromSource"
          nullable: true
          description: |
            Information about the organizational unit where the user is (or is not) located.
            Filled in for codes different_organization, different_clinic, different_department.
            Shows where the user is actually located (organization/clinic/department), thus explaining the incompatibility.
            Null for code not_an_employee (user is not an employee at all).

    ResponsibleCandidate:
      type: object
      required: [user, eligible, ineligibilityReasons]
      properties:
        user:
          $ref: "#/components/schemas/UserBrief"
        eligible:
          type: boolean
        ineligibilityReasons:
          type: array
          items:
            $ref: "#/components/schemas/IneligibilityReason"

    ResponsibleCandidateListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResponsibleCandidate"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    # ==================================================================================================
    # Specific Request/Response Schemas
    # ==================================================================================================

    GetMeResponse:
      $ref: "#/components/schemas/User"

    ListUsersResponse:
      $ref: "#/components/schemas/UserListResponse"

    GetUserByIdResponse:
      $ref: "#/components/schemas/User"

    GetMyNotificationSettingsResponse:
      $ref: "#/components/schemas/NotificationSettings"

    UpdateMyNotificationSettingsRequest:
      $ref: "#/components/schemas/NotificationSettings"

    ListOrganizationsResponse:
      $ref: "#/components/schemas/OrganizationListResponse"

    CreateOrganizationResponse:
      $ref: "#/components/schemas/Organization"

    GetOrganizationByIdResponse:
      $ref: "#/components/schemas/Organization"

    ListOrganizationResponsiblesResponse:
      $ref: "#/components/schemas/ResponsibleListResponse"

    AddOrganizationResponsibleRequest:
      $ref: "#/components/schemas/AddResponsibleRequest"

    ListOrganizationResponsibleCandidatesResponse:
      $ref: "#/components/schemas/ResponsibleCandidateListResponse"

    ListOrganizationEmployeesResponse:
      $ref: "#/components/schemas/OrganizationEmployeeListResponse"

    ListOrganizationCategoriesResponse:
      $ref: "#/components/schemas/OrganizationCategoryListResponse"

    ListOrganizationCategoryCandidatesResponse:
      $ref: "#/components/schemas/OrganizationCategoryCandidateListResponse"

    ListOrganizationCategoryResponsiblesResponse:
      $ref: "#/components/schemas/CategoryResponsibleListResponse"

    AddOrganizationCategoryResponsibleRequest:
      $ref: "#/components/schemas/AddResponsibleRequest"

    ListOrganizationCategoryResponsibleCandidatesResponse:
      $ref: "#/components/schemas/ResponsibleCandidateListResponse"

    ListOrganizationClinicsResponse:
      $ref: "#/components/schemas/ClinicListResponse"

    CreateClinicResponse:
      $ref: "#/components/schemas/Clinic"

    GetClinicByIdResponse:
      $ref: "#/components/schemas/Clinic"

    ListClinicResponsiblesResponse:
      $ref: "#/components/schemas/ResponsibleListResponse"

    AddClinicResponsibleRequest:
      $ref: "#/components/schemas/AddResponsibleRequest"

    ListClinicResponsibleCandidatesResponse:
      $ref: "#/components/schemas/ResponsibleCandidateListResponse"

    ListClinicEmployeesResponse:
      $ref: "#/components/schemas/ClinicEmployeeListResponse"

    ListClinicDepartmentsResponse:
      $ref: "#/components/schemas/DepartmentListResponse"

    CreateDepartmentResponse:
      $ref: "#/components/schemas/Department"

    GetDepartmentByIdResponse:
      $ref: "#/components/schemas/Department"

    ListDepartmentEmployeesResponse:
      $ref: "#/components/schemas/DepartmentEmployeeListResponse"

    ListDepartmentResponsiblesResponse:
      $ref: "#/components/schemas/ResponsibleListResponse"

    AddDepartmentResponsibleRequest:
      $ref: "#/components/schemas/AddResponsibleRequest"

    ListDepartmentResponsibleCandidatesResponse:
      $ref: "#/components/schemas/ResponsibleCandidateListResponse"

    ListEventCategoriesResponse:
      $ref: "#/components/schemas/CategoryListResponse"

    CreateEventCategoryResponse:
      $ref: "#/components/schemas/Category"

    GetEventCategoryByIdResponse:
      $ref: "#/components/schemas/Category"

    ListEventCategoryTypesResponse:
      $ref: "#/components/schemas/EventTypeListResponse"

    CreateEventTypeResponse:
      $ref: "#/components/schemas/EventType"

    GetEventTypeByIdResponse:
      $ref: "#/components/schemas/EventType"

    ListEventTypesResponse:
      $ref: "#/components/schemas/EventTypeListResponse"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Cursor token to retrieve the next page.

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SearchText:
      name: q
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 120
      description: Search string to filter results.

    IncludeDeactivated:
      name: includeDeactivated
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        Whether to include deactivated entities in the result.
        Default is false — only active entities are returned.
    IncludeIneligible:
      name: includeIneligible
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: |
        Whether to show ineligible candidates as well.
        Does not affect deactivated users: they are not returned.
    IneligibilityReasonCodes:
      name: ineligibilityReasonCodes
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/IneligibilityReasonCode"
      description: |
        Filter for ineligibility reasons of candidates.
        Applied when includeIneligible=true.
        If the user is not an employee, only the cause `not_an_employee` is returned.
        For employees, reasons `different_organization`, `different_clinic`, `different_department` are used.
    CategoryCandidateIneligibilityReasonCodes:
      name: ineligibilityReasonCodes
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/CategoryCandidateIneligibilityReasonCode"
      description: |
        Filter for category candidate ineligibility reasons.
        Applied when includeIneligible=true.
        This parameter is ignored when includeIneligible=false.
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string

    TypeId:
      name: typeId
      in: path
      required: true
      schema:
        type: string

    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string

    ClinicId:
      name: clinicId
      in: path
      required: true
      schema:
        type: string

    DepartmentId:
      name: departmentId
      in: path
      required: true
      schema:
        type: string

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    ResponsibleUserId:
      name: responsibleUserId
      in: path
      required: true
      schema:
        type: string
    EventTypeCategoryId:
      name: categoryId
      in: query
      required: false
      schema:
        type: string

      description: Filter by category.
    EventTypePatientCanReport:
      name: patientCanReport
      in: query
      required: false
      schema:
        type: boolean
      description: Filter by patient availability flag.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Validation failed
            traceId: 4f2b4129f2c4420ba5d6b86f5c4f03d7
            details:
              type: validation
              fields:
                - field: dateFrom
                  issue: invalid_format
    Unauthorized:
      description: User unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Authorization header is missing or invalid
            traceId: 214f95a2d6f94964a9d3bb8193f4f3d3
            details:
              type: unauthorized
              reason: missing_or_invalid_token
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Access denied for this resource
            traceId: 2cb85f14f58f4b8da2e2218a75ca5e95
            details:
              type: forbidden
              requiredPermission: administrator
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Resource not found
            traceId: 0bb98e28d01442a39d1ebd41fcf14896
            details:
              type: not_found
              resource: event
              id: d7c884c3-2e84-40c8-9d4c-0e8f217d7314
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Resource with same unique fields already exists
            traceId: 8fae7e9484be45a5acaa601ce48622da
            details:
              type: conflict
              feature: code
    BusinessRuleViolation:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Event cannot be edited after status set to in_progress
            traceId: 9b186efef7c74f008b7529f4ca838fd6
            details:
              type: business_rule_violation
              reason: event_in_progress
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Internal Server Error
            traceId: 9b186efef7c74f008b7529f4ca838fd6

paths:
  /users/me:
    get:
      tags: [Users]
      summary: Current user profile
      operationId: getMe
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/settings/notifications:
    get:
      tags: [Users]
      summary: Get notification settings
      operationId: getMyNotificationSettings
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: Current notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMyNotificationSettingsResponse"
    put:
      tags: [Users]
      summary: Update notification settings
      operationId: updateMyNotificationSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyNotificationSettingsRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "204":
          description: Operation completed successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /users:
    get:
      tags: [Users]
      summary: Get list of all users
      description: |
        Requires administrator privileges.
        Supports cursor pagination for iterating through all users.
        By default, deactivated users are not shown (behavior similar to deleted).
        When includeDeactivated=true, deactivated users are also returned.
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/IncludeDeactivated"
        - $ref: "#/components/parameters/SearchText"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: |
        Requires administrator privileges.
        Returns detailed user information and whether the user is an administrator.
      operationId: getUserById
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: Detailed user information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserByIdResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Users]
      summary: Delete user
      description: |
        Requires administrator privileges.
        Deletion is allowed only when system business rules are met.
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /users/{userId}/display-name:
    put:
      tags: [Users]
      summary: Set user display name
      description: |
        Requires administrator privileges.
        Used to correct an incorrect username.
      operationId: updateUserDisplayName
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserDisplayNameRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Users]
      summary: Reset custom user display name
      description: |
        Requires administrator privileges.
        Removes the custom display name and restores the original username.
      operationId: clearUserDisplayName
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{userId}/deactivate:
    post:
      tags: [Users]
      summary: Deactivate user
      description: |
        Requires administrator privileges.
        After deaсtivation, the user does not participate in operational processes and is not returned
        in regular lists without includeDeactivated=true.
        Historical data (events, chats, assignments) is preserved.
      operationId: deactivateUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /users/{userId}/reactivate:
    post:
      tags: [Users]
      summary: Reactivate user
      description: |
        Requires administrator privileges.
        Returns the user to an active state.
      operationId: reactivateUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /organizations:
    get:
      tags: [Organizations]
      summary: List of organizations
      description: |
        Requires administrator privileges.
        Returns only active organizations by default.
        When includeDeactivated=true, deactivated organizations are also returned.
      operationId: listOrganizations
      parameters:
        - $ref: "#/components/parameters/IncludeDeactivated"
        - $ref: "#/components/parameters/SearchText"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationsResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Organizations]
      summary: Create organization
      description: Requires administrator privileges.
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "201":
          description: Resource created
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /organizations/{organizationId}:
    get:
      tags: [Organizations]
      summary: Get organization by ID
      description: |
        Requires administrator privileges.
        Deactivated organizations are considered deleted and return 404.
      operationId: getOrganizationById
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOrganizationByIdResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Organizations]
      summary: Update organization
      description: Requires administrator privileges.
      operationId: updateOrganization
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"
    delete:
      tags: [Organizations]
      summary: Delete organization
      description: |
        Requires administrator privileges.
        Deletion is allowed only if the organization has no clinics and associated employees.
      operationId: deleteOrganization
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /organizations/{organizationId}/deactivate:
    post:
      tags: [Organizations]
      summary: Deactivate organization
      description: |
        Requires administrator privileges.
        After organization deactivation, new events cannot be created in associated clinics and departments.
        Historical data is preserved: employees, events, assignments, and links are not deleted.
      operationId: deactivateOrganization
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /organizations/{organizationId}/reactivate:
    post:
      tags: [Organizations]
      summary: Reactivate organization
      description: |
        Requires administrator privileges.
        Returns the organization to an active state.
      operationId: reactivateOrganization
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /organizations/{organizationId}/responsibles:
    get:
      tags: [Organizations]
      summary: Get organization responsibles
      description: |
        Requires administrator privileges.
        Returns responsibles assigned directly to the organization.
        Organization responsibles are inherited by all clinics and departments within it.
      operationId: listOrganizationResponsibles
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of responsibles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationResponsiblesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Organizations]
      summary: Add organization responsible
      description: |
        Requires administrator privileges.
        The user must belong to this organization
        (be an employee of at least one department of any clinic in the organization).
      operationId: addOrganizationResponsible
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrganizationResponsibleRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/BusinessRuleViolation"

  /organizations/{organizationId}/responsible-candidates:
    get:
      tags: [Organizations]
      summary: Get organization responsible candidates
      description: |
        Requires administrator privileges.
        Returns only eligible candidates by default.
        When includeIneligible=true, ineligible candidates are also returned with reasons.
        Deactivated users are not returned.
      operationId: listOrganizationResponsibleCandidates
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/SearchText"
        - $ref: "#/components/parameters/IncludeIneligible"
        - $ref: "#/components/parameters/IneligibilityReasonCodes"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of organization responsible candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationResponsibleCandidatesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{organizationId}/employees:
    get:
      tags: [Organizations]
      summary: Get organization employees
      description: |
        Requires administrator privileges.
        Supports search by `q` and cursor pagination.
      operationId: listOrganizationEmployees
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/SearchText"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of organization employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationEmployeesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{organizationId}/responsibles/{responsibleUserId}:
    delete:
      tags: [Organizations]
      summary: Remove organization responsible
      description: |
        Requires administrator privileges.
        Removes a responsible assigned directly to the organization.
      operationId: removeOrganizationResponsible
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/ResponsibleUserId"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "204":
          description: Operation completed successfully
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{organizationId}/categories:
    get:
      tags: [Organizations]
      summary: List of categories allowed for organization
      description: |
        Requires administrator privileges.
        Returns all categories allowed for this organization — explicitly and via inheritance.
        Categories are returned in a flat list in depth-first traversal order:
        first the root category, then all its children, then the next root one.
        For child categories, category.parentId is filled so the UI can reconstruct the tree.
      operationId: listOrganizationCategories
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "200":
          description: List of allowed organization categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationCategoriesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Organizations]
      summary: Enable category for organization
      description: |
        Requires administrator privileges.
        Explicitly enables a category for this organization.
        All child categories of the enabled category automatically
        become available via inheritance (isDirectlyEnabled=false).
      operationId: enableOrganizationCategory
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableOrganizationCategoryRequest"
      responses:
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
