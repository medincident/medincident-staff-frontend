services:
  nextjs:
    build:
      context: .
      dockerfile: ./deployment/site.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: nextjs_app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_gateway
    restart: unless-stopped
    ports:
      - "8083:80"
    networks:
      - default
      - proxy-network
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs

networks:
  proxy-network:
    external: true