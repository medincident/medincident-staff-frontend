services:
  api:
    build:
      context: ./backend
      dockerfile: ../deployment/api.Dockerfile
    container_name: python_api
    restart: unless-stopped
    ports:
      - "8082:3232"

  nextjs:
    build:
      context: .
      dockerfile: ./deployment/site.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: nextjs_app
    restart: unless-stopped
    ports:
      - "8083:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - api