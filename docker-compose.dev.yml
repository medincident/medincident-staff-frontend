name: medincident-staff-dev

services:
  nextjs:
    image: oven/bun:1.3-alpine
    container_name: nextjs_app_dev
    working_dir: /app
    # При первом старте поставим зависимости в named volume.
    # Дальнейшие старты быстрые — node_modules переиспользуется.
    command: sh -c "[ -d node_modules/next ] || bun install --frozen-lockfile; bun run dev"
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # File-system watching через polling — иначе hot-reload не видит
      # изменения с хоста (типичный bind-mount-gotcha).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      # node_modules и .next держим в named volumes, чтобы не пересекаться
      # с продовским image-сборкой и не тащить из хоста (на хосте может
      # быть ABI с другой архитектуры).
      - dev_node_modules:/app/node_modules
      - dev_next_cache:/app/.next
    networks:
      default: {}
      # Подключаемся к общей proxy-network с алиасом "nextjs", чтобы
      # nginx_gateway из prod проксировал /, /api/auth/ в этот контейнер
      # ровно так же, как он делал бы с прод-фронтом.
      proxy-network:
        aliases:
          - nextjs

volumes:
  dev_node_modules:
  dev_next_cache:

networks:
  proxy-network:
    external: true
